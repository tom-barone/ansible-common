---
- name: "Validate required variables"
  ansible.builtin.assert:
    that:
      - "postgres_install_docker_password is defined"
      - "postgres_install_docker_password | length > 0"
    msg: "Missing a required variable"

- name: "Check if Docker network exists"
  ansible.builtin.command:
    cmd: >-
      docker network inspect
      {{ postgres_install_docker_network }}
  register: "postgres_install_docker_network_check"
  failed_when: false
  changed_when: false

- name: "Create Docker network"
  ansible.builtin.command:
    cmd: >-
      docker network create
      {{ postgres_install_docker_network }}
  when: "postgres_install_docker_network_check.rc != 0"
  changed_when: true

- name: "Create install directory"
  ansible.builtin.file:
    path: "{{ postgres_install_docker_dir }}"
    state: "directory"
    mode: "0755"

- name: "Deploy docker-compose.yml"
  ansible.builtin.template:
    src: "docker-compose.yml.j2"
    dest: "{{ postgres_install_docker_dir }}/docker-compose.yml"
    mode: "0600"
  notify: "Restart postgres"

- name: "Start postgres"
  ansible.builtin.command:
    cmd: "docker compose up -d"
    chdir: "{{ postgres_install_docker_dir }}"
  register: "postgres_install_docker_up"
  changed_when: >
    'Started' in postgres_install_docker_up.stderr or
    'Created' in postgres_install_docker_up.stderr

- name: "Wait for PostgreSQL to be ready"
  ansible.builtin.command:
    cmd: >-
      docker exec {{ postgres_install_docker_container_name }}
      pg_isready -U {{ postgres_install_docker_user }}
  register: "postgres_install_docker_ready"
  until: "postgres_install_docker_ready.rc == 0"
  retries: 15
  delay: 3
  changed_when: false
