---
# Ansible role to setup unattended-upgrades
#
# Check recent upgrades with
# $ sudo tail -n 100 /var/log/dpkg.log
# Confirm the next upgrade with
# $ sudo unattended-upgrades --dry-run --debug
# Check the settings are set
# $ sudo cat /etc/apt/apt.conf.d/20auto-upgrades

- name: "Install required packages for unattended-upgrades"
  ansible.builtin.apt:
    name:
      - "unattended-upgrades"
      - "apt-listchanges"
    state: "present"
    update_cache: true
    cache_valid_time: 3600

- name: "Enable periodic apt updates and unattended-upgrades"
  ansible.builtin.copy:
    dest: "/etc/apt/apt.conf.d/20auto-upgrades"
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

# Without this, unattended-upgrades skips packages whose upgrade would trigger
# a dpkg conffile prompt ("Package X has conffile prompt and needs to be
# upgraded manually"). Only --force-confnew or --force-confold disables that
# skip. Kept out of 50unattended-upgrades because that file is itself a
# conffile of the unattended-upgrades package.
- name: "Resolve conffile prompts automatically during unattended upgrades"
  ansible.builtin.copy:
    dest: "/etc/apt/apt.conf.d/51unattended-upgrades-conffile"
    mode: "0644"
    content: |
      Dpkg::Options {
         "--force-{{ system_unattended_upgrades_conffile_action }}";
      };

- name: "Ensure unattended-upgrades is enabled and started"
  ansible.builtin.systemd:
    name: "unattended-upgrades"
    enabled: true
    state: "started"
