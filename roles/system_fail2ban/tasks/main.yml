---
# Tests to confirm working:
#   $ fail2ban-client status sshd
#   $ tail -n 100 /var/log/auth.log
#   $ tail -n 100 /var/log/fail2ban.log
# If using systemd backend:
#   $ journalctl -u fail2ban
#   $ systemctl status sshd --no-pager
#
# Unban an IP (if needed):
#   `sudo fail2ban-client set sshd unbanip <IP_ADDRESS>`

- name: "Install fail2ban and dependencies"
  ansible.builtin.apt:
    pkg:
      - "fail2ban"
      - "whois"
    update_cache: true
    state: "present"

- name: "Configure jail for sshd"
  ansible.builtin.template:
    src: "files/jail.local.j2"
    dest: "/etc/fail2ban/jail.local"
    mode: "0644"
    backup: true
  notify: "Restart fail2ban"

- name: "Test fail2ban configuration"
  ansible.builtin.command:
    argv:
      - "fail2ban-client"
      - "-d"
      - "--test"
  changed_when: false

- name: "Ensure fail2ban is enabled and started"
  ansible.builtin.systemd:
    name: "fail2ban"
    state: "started"
    enabled: true
