---
# Required vars:
# postgres_restic_backup_s3_endpoint: "s3.ap-southeast-2.amazonaws.com"
# postgres_restic_backup_s3_bucket: "my-postgres-backups"
# postgres_restic_backup_s3_access_key: "AKIA..."
# postgres_restic_backup_s3_secret_key: "secret"
# postgres_restic_backup_restic_password: "secret"

postgres_restic_backup_dir: "/opt/postgres-backup"
postgres_restic_backup_cron_schedule: "0 3 * * *"
postgres_restic_backup_cron_timezone: "UTC"
postgres_restic_backup_retention_daily: 7
postgres_restic_backup_retention_weekly: 4
postgres_restic_backup_retention_monthly: 9999
postgres_restic_backup_postgres_user: >-
  {{ postgres_install_docker_user | default('postgres') }}
postgres_restic_backup_postgres_container: "postgres"
postgres_restic_backup_restore_on_bootstrap: true
postgres_restic_backup_restore_guard_query: >-
  SELECT
  (SELECT count(*) FROM pg_database
  WHERE datistemplate = false AND datname <> 'postgres')
  + (SELECT count(*) FROM pg_class c
  JOIN pg_namespace n ON n.oid = c.relnamespace
  WHERE c.relkind IN ('r', 'p')
  AND n.nspname NOT IN ('pg_catalog', 'information_schema')
  AND n.nspname !~ '^pg_');
