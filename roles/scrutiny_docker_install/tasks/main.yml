---
- name: "Install smartmontools"
  ansible.builtin.apt:
    pkg:
      - "smartmontools"
    state: "present"
    update_cache: true
    cache_valid_time: 3600

- name: "Discover S.M.A.R.T. devices via smartctl --scan"
  ansible.builtin.command:
    cmd: "smartctl --scan"
  register: "scrutiny_docker_install_scan"
  changed_when: false

- name: "Parse discovered device paths"
  ansible.builtin.set_fact:
    scrutiny_docker_install_devices: >-
      {{
        scrutiny_docker_install_scan.stdout_lines
        | select('match', '^/dev/')
        | map('regex_replace', '^(\S+).*$', '\1')
        | list
      }}

- name: "Create install directory"
  ansible.builtin.file:
    path: "{{ scrutiny_docker_install_dir }}"
    state: "directory"
    mode: "0755"

- name: "Create scrutiny config directory"
  ansible.builtin.file:
    path: "{{ scrutiny_docker_install_dir }}/config"
    state: "directory"
    mode: "0755"

- name: "Deploy scrutiny.yaml"
  ansible.builtin.template:
    src: "scrutiny.yaml.j2"
    dest: "{{ scrutiny_docker_install_dir }}/config/scrutiny.yaml"
    mode: "0644"
  when:
    - "scrutiny_docker_install_notify_urls | length > 0"
  notify: "Restart scrutiny"

- name: "Deploy docker-compose.yml"
  ansible.builtin.template:
    src: "docker-compose.yml.j2"
    dest: "{{ scrutiny_docker_install_dir }}/docker-compose.yml"
    mode: "0644"
  notify: "Restart scrutiny"

- name: "Start scrutiny"
  ansible.builtin.command:
    cmd: "docker compose up -d"
    chdir: "{{ scrutiny_docker_install_dir }}"
  register: "scrutiny_docker_install_up"
  changed_when: >
    'Started' in scrutiny_docker_install_up.stderr or
    'Created' in scrutiny_docker_install_up.stderr

- name: "Flush handlers so any pending restart fires before API tasks"
  ansible.builtin.meta: "flush_handlers"

- name: "Wait for Scrutiny API to be ready"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ scrutiny_docker_install_port }}/api/health"
    status_code: 200
  register: "scrutiny_docker_install_health"
  until: "scrutiny_docker_install_health.status == 200"
  retries: 30
  delay: 2

- name: "Read current Scrutiny settings"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ scrutiny_docker_install_port }}/api/settings"
    method: "GET"
    return_content: true
  register: "scrutiny_docker_install_settings"

- name: "Apply desired Scrutiny settings (preserve everything else)"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ scrutiny_docker_install_port }}/api/settings"
    method: "POST"
    body_format: "json"
    status_code: 200
    body: >-
      {{
        scrutiny_docker_install_settings.json.settings | combine({
          'metrics': {
            'repeat_notifications': scrutiny_docker_install_repeat_notifications
          }
        }, recursive=true)
      }}
  when:
    - >-
      scrutiny_docker_install_settings.json.settings.metrics.repeat_notifications
      != scrutiny_docker_install_repeat_notifications
