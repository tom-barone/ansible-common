---
# Logcheck sends emails to root, which we've aliased
# to our email address
# $ sudo cat /etc/logcheck/logcheck.conf
# Print recent logs to stdout with and don't update the pointer
# $ sudo -u logcheck logcheck -o -t
# Send email to root user (and therefore us) with:
# $ sudo -u logcheck logcheck
# To add a test log that will flag
# $ logger -p kern.error This is a test
#
# By default logcheck will run via cron (see /etc/cron.d/logcheck):
# - every hour
# - on reboot
#
# To check all mail
# $ ls -lh /var/mail/logcheck
#
# To clear the mailbox:
# $ truncate -s 0 /var/mail/logcheck

- name: "Validate required variables"
  ansible.builtin.assert:
    that:
      - "system_logcheck_enable_journal is defined"
      - "system_logcheck_enable_syslog is defined"
    msg: "Missing a required variable"

- name: "Install logcheck"
  ansible.builtin.apt:
    name: "logcheck"
    update_cache: true
    cache_valid_time: 3600
    state: "present"

- name: "Add logcheck ignore rules"
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "/etc/logcheck/ignore.d.server/{{ item | basename }}"
    mode: "0644"
  loop: "{{ query('fileglob', 'files/*') }}"

- name: "Configure journal logfiles"
  ansible.builtin.template:
    src: "templates/journal.logfiles.j2"
    dest: "/etc/logcheck/logcheck.logfiles.d/journal.logfiles"
    mode: "0644"

- name: "Configure syslog logfiles"
  ansible.builtin.template:
    src: "templates/syslog.logfiles.j2"
    dest: "/etc/logcheck/logcheck.logfiles.d/syslog.logfiles"
    mode: "0644"

- name: "Run and test"
  ansible.builtin.command: >
    su -s /bin/bash -c "/usr/sbin/logcheck" logcheck
  changed_when: false
