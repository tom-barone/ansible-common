---
- name: "Validate required variables"
  ansible.builtin.assert:
    that:
      - "system_swapfile_path is defined"
      - "system_swapfile_path | length > 0"
      - "system_swapfile_size is defined"
      - "system_swapfile_size | length > 0"
      - "system_swapfile_swappiness is defined"
      - "system_swapfile_swappiness is number"
    msg: "Missing a required variable"

- name: "Compute desired swapfile size in bytes"
  ansible.builtin.set_fact:
    system_swapfile_size_bytes: "{{ system_swapfile_size | human_to_bytes }}"

- name: "Stat existing swapfile"
  ansible.builtin.stat:
    path: "{{ system_swapfile_path }}"
  register: "system_swapfile_stat"

- name: "Detect type of existing file"
  ansible.builtin.command:
    argv:
      - "file"
      - "--brief"
      - "{{ system_swapfile_path }}"
  register: "system_swapfile_file_type"
  changed_when: false
  check_mode: false
  when: "system_swapfile_stat.stat.exists"

- name: "Decide whether swapfile needs (re)creation"
  ansible.builtin.set_fact:
    system_swapfile_recreate: >-
      {{ (not system_swapfile_stat.stat.exists)
         or ((system_swapfile_stat.stat.size | int)
             != (system_swapfile_size_bytes | int))
         or ('swap file' not in
             (system_swapfile_file_type.stdout | default(''))) }}

- name: "Read active swap devices before recreating"
  ansible.builtin.slurp:
    src: "/proc/swaps"
  register: "system_swapfile_proc_swaps_pre"
  when:
    - "system_swapfile_recreate"
    - "system_swapfile_stat.stat.exists"

- name: "Disable existing swap before recreating"
  ansible.builtin.command:
    argv:
      - "swapoff"
      - "{{ system_swapfile_path }}"
  when:
    - "system_swapfile_recreate"
    - "system_swapfile_stat.stat.exists"
    - >-
      system_swapfile_path
      in (system_swapfile_proc_swaps_pre.content | default('') | b64decode)
  changed_when: true

- name: "Remove existing swapfile before recreating"
  ansible.builtin.file:
    path: "{{ system_swapfile_path }}"
    state: "absent"
  when:
    - "system_swapfile_recreate"
    - "system_swapfile_stat.stat.exists"

- name: "Allocate swapfile"
  ansible.builtin.command:
    argv:
      - "fallocate"
      - "-l"
      - "{{ system_swapfile_size }}"
      - "{{ system_swapfile_path }}"
  when: "system_swapfile_recreate"
  changed_when: true

- name: "Set swapfile permissions"
  ansible.builtin.file:
    path: "{{ system_swapfile_path }}"
    owner: "root"
    group: "root"
    mode: "0600"
    state: "file"

- name: "Format swapfile"
  ansible.builtin.command:
    argv:
      - "mkswap"
      - "{{ system_swapfile_path }}"
  when: "system_swapfile_recreate"
  changed_when: true

- name: "Add swapfile to fstab"
  ansible.posix.mount:
    name: "none"
    src: "{{ system_swapfile_path }}"
    fstype: "swap"
    opts: "sw"
    dump: "0"
    passno: "0"
    state: "present"

- name: "List currently active swap devices"
  ansible.builtin.command:
    argv:
      - "swapon"
      - "--show=NAME"
      - "--noheadings"
      - "--raw"
  register: "system_swapfile_active_swaps"
  changed_when: false
  check_mode: false

- name: "Activate swapfile"
  ansible.builtin.command:
    argv:
      - "swapon"
      - "{{ system_swapfile_path }}"
  when:
    - "system_swapfile_path not in system_swapfile_active_swaps.stdout_lines"
  changed_when: true

- name: "Set vm.swappiness"
  ansible.posix.sysctl:
    name: "vm.swappiness"
    value: "{{ system_swapfile_swappiness | string }}"
    sysctl_file: "/etc/sysctl.d/99-swapfile.conf"
    state: "present"
    reload: true
