---
- name: "Validate required variables"
  ansible.builtin.assert:
    that:
      - "system_swapfile_path is defined"
      - "system_swapfile_path | length > 0"
      - "system_swapfile_size is defined"
      - "system_swapfile_size | length > 0"
      - "system_swapfile_swappiness is defined"
      - "system_swapfile_swappiness is number"
    msg: "Missing a required variable"

- name: "Stat existing swapfile"
  ansible.builtin.stat:
    path: "{{ system_swapfile_path }}"
  register: "system_swapfile_stat"

- name: "Allocate swapfile"
  ansible.builtin.command:
    argv:
      - "fallocate"
      - "-l"
      - "{{ system_swapfile_size }}"
      - "{{ system_swapfile_path }}"
  when: "not system_swapfile_stat.stat.exists"
  changed_when: true

- name: "Set swapfile permissions"
  ansible.builtin.file:
    path: "{{ system_swapfile_path }}"
    owner: "root"
    group: "root"
    mode: "0600"
    state: "file"

- name: "Detect whether file already has a swap signature"
  ansible.builtin.command:
    argv:
      - "file"
      - "--brief"
      - "{{ system_swapfile_path }}"
  register: "system_swapfile_file_type"
  changed_when: false
  check_mode: false

- name: "Format swapfile"
  ansible.builtin.command:
    argv:
      - "mkswap"
      - "{{ system_swapfile_path }}"
  when: "'swap file' not in system_swapfile_file_type.stdout"
  changed_when: true

- name: "Add fstab entry for swapfile"
  ansible.posix.mount:
    name: "none"
    src: "{{ system_swapfile_path }}"
    fstype: "swap"
    opts: "sw"
    dump: "0"
    passno: "0"
    state: "present"

- name: "Read active swap devices"
  ansible.builtin.slurp:
    src: "/proc/swaps"
  register: "system_swapfile_proc_swaps"

- name: "Activate swapfile if not already active"
  ansible.builtin.command:
    argv:
      - "swapon"
      - "{{ system_swapfile_path }}"
  when: >-
    system_swapfile_path
    not in (system_swapfile_proc_swaps.content | b64decode)
  changed_when: true

- name: "Set vm.swappiness"
  ansible.posix.sysctl:
    name: "vm.swappiness"
    value: "{{ system_swapfile_swappiness | string }}"
    sysctl_file: "/etc/sysctl.d/99-swapfile.conf"
    state: "present"
    reload: true
