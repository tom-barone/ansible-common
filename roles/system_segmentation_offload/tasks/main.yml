---
# Disable TCP and generic segmentation offloads (TSO/GSO) on a list of
# network interfaces, working around NIC bugs like the Intel e1000e
# "Detected Hardware Unit Hang". Each interface gets an instance of a
# device-bound systemd template unit, so the offloads are disabled again
# at boot and whenever the device reappears (e.g. driver reload).
#
# Usage: pass the kernel interface names (see `ip link`) to fix:
#
#   - role: "system_segmentation_offload"
#     vars:
#       system_segmentation_offload_interfaces:
#         - "enp0s31f6"
#
# Removing an interface from the list later does not re-enable its
# offloads; disable segmentation-offload@<iface>.service manually.
#
# Tests to confirm working:
#   $ systemctl status segmentation-offload@<iface>.service
#   $ ethtool -k <iface> | grep segmentation
#     -> tcp-segmentation-offload and generic-segmentation-offload "off"

- name: "Validate required variables"
  ansible.builtin.assert:
    that:
      - "system_segmentation_offload_interfaces is defined"
      - "system_segmentation_offload_interfaces is not string"
      - "system_segmentation_offload_interfaces | length > 0"
    msg: "Missing a required variable"

- name: "Install ethtool"
  ansible.builtin.apt:
    pkg:
      - "ethtool"
    state: "present"
    update_cache: true
    cache_valid_time: 3600

- name: "Deploy segmentation offload systemd template unit"
  ansible.builtin.template:
    src: "segmentation-offload@.service.j2"
    dest: "/etc/systemd/system/segmentation-offload@.service"
    mode: "0644"
  notify: "Restart segmentation offload services"

- name: "Enable and start segmentation offload services"
  ansible.builtin.systemd:
    name: "segmentation-offload@{{ item }}.service"
    enabled: true
    state: "started"
    daemon_reload: true
  loop: "{{ system_segmentation_offload_interfaces }}"
