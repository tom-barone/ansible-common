---
name: "continuous integration"

on:
  push:
    branches: ["main"]
  pull_request:

# Run only one CI workflow at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: "Set up QEMU"
        uses: docker/setup-qemu-action@v4

      - name: Import GPG key
        run: echo "${{ secrets.SOPS_GITHUB_ACTIONS_GPG_PRIVATE_KEY }}" | gpg --batch --import
      - name: "Install SOPS"
        uses: "nhedger/setup-sops@v2"

      - name: Install just
        uses: extractions/setup-just@v3
        with:
          just-version: "1.42.4"

      - name: "Install uv"
        uses: "astral-sh/setup-uv@v7"
        with:
          version: "0.9.17"
          enable-cache: true

      - name: "Enable KVM access"
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: "Install QEMU and cloud-image tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y genisoimage qemu-utils qemu-system-x86

      - name: "Generate SSH key for tests"
        run: >-
          ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519
          -N "" -q

      #- name: Run linters
      #  shell: bash
      #  run: "just lint"

      - name: Run tests
        run: "just test --name qemu_create_destroy --no-capture"
