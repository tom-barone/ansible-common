---
name: "continuous integration"

on:
  push:
    branches: ["main"]

# Run only one CI workflow at a time
concurrency:
  group: "main"
  cancel-in-progress: false

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: "Set up QEMU"
        uses: docker/setup-qemu-action@v4

      - name: Import GPG key
        run: echo "${{ secrets.SOPS_GITHUB_ACTIONS_GPG_PRIVATE_KEY }}" | gpg --batch --import
      - name: "Install SOPS"
        uses: "nhedger/setup-sops@v2"

      - name: Install just
        uses: extractions/setup-just@v3
        with:
          just-version: "1.42.4"

      - name: "Install uv"
        uses: "astral-sh/setup-uv@v7"
        with:
          version: "0.9.17"
          enable-cache: true

      - name: "Install QEMU and cloud-image tools"
        run: |
          #sudo apt-get update
          sudo apt-get install -y genisoimage

      #- name: Run linters
      #  shell: bash
      #  run: "just lint"

      - name: Run tests
        run: "just test --name qemu_create_destroy --no-capture"
