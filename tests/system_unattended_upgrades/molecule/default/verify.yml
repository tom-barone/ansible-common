---
- name: "Verify"
  hosts: "all"
  tasks:
    - name: "Check unattended-upgrades service status"
      ansible.builtin.systemd:
        name: "unattended-upgrades"
      register: "status"

    - name: "Assert unattended-upgrades service is active and enabled"
      ansible.builtin.assert:
        that:
          - "status.status.ActiveState == 'active'"
          - "status.status.UnitFileState == 'enabled'"
        msg: "unattended-upgrades service is not active and enabled"

    - name: "Dump apt Dpkg::Options"
      ansible.builtin.command: "apt-config dump Dpkg::Options"
      changed_when: false
      register: "dpkg_options"

    - name: "Assert conffile prompts are resolved with confnew"
      ansible.builtin.assert:
        that:
          - "'--force-confnew' in dpkg_options.stdout"
        msg: "Dpkg::Options does not contain --force-confnew"
