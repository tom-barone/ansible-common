---
- name: "Prepare"
  hosts: "all"
  tasks:
    - name: "Install Docker"
      ansible.builtin.include_role:
        name: "docker_install"
      vars:
        docker_install_storage_driver: "vfs"

    - name: "Create Docker network"
      ansible.builtin.include_role:
        name: "docker_network_create"
      vars:
        docker_network_create_name: "postgres_network"

    - name: "Install and start PostgreSQL"
      ansible.builtin.include_role:
        name: "postgres_install_docker"
      vars:
        postgres_install_docker_password: "testpassword123"
        postgres_install_docker_network: "postgres_network"

    - name: "Count user data on fresh postgres"
      ansible.builtin.command:
        cmd: >-
          docker exec postgres
          psql -U postgres -t -A -c
          "SELECT
          (SELECT count(*) FROM pg_database
          WHERE datistemplate = false AND datname <> 'postgres')
          + (SELECT count(*) FROM pg_class c
          JOIN pg_namespace n ON n.oid = c.relnamespace
          WHERE c.relkind IN ('r', 'p')
          AND n.nspname NOT IN ('pg_catalog', 'information_schema')
          AND n.nspname !~ '^pg_');"
      register: "fresh_user_data_count"
      changed_when: false

    - name: "Assert fresh postgres reports no user data"
      ansible.builtin.assert:
        that:
          - "fresh_user_data_count.stdout | trim | int == 0"
        fail_msg: >-
          Restore guard query returned
          '{{ fresh_user_data_count.stdout | trim }}' on a fresh postgres,
          expected '0'

    - name: "Create a user table in the postgres database"
      ansible.builtin.command:
        cmd: >-
          docker exec postgres
          psql -U postgres -c
          "CREATE TABLE guard_check (id int);
          INSERT INTO guard_check VALUES (1);"
      changed_when: true

    - name: "Count user data with a populated postgres database"
      ansible.builtin.command:
        cmd: >-
          docker exec postgres
          psql -U postgres -t -A -c
          "SELECT
          (SELECT count(*) FROM pg_database
          WHERE datistemplate = false AND datname <> 'postgres')
          + (SELECT count(*) FROM pg_class c
          JOIN pg_namespace n ON n.oid = c.relnamespace
          WHERE c.relkind IN ('r', 'p')
          AND n.nspname NOT IN ('pg_catalog', 'information_schema')
          AND n.nspname !~ '^pg_');"
      register: "populated_user_data_count"
      changed_when: false

    - name: "Assert populated postgres reports user data"
      ansible.builtin.assert:
        that:
          - "populated_user_data_count.stdout | trim | int > 0"
        fail_msg: >-
          Restore guard query returned
          '{{ populated_user_data_count.stdout | trim }}' with a table in the
          postgres database, expected a non-zero count

    - name: "Drop the guard-check table to return postgres to empty"
      ansible.builtin.command:
        cmd: >-
          docker exec postgres
          psql -U postgres -c
          "DROP TABLE guard_check;"
      changed_when: true

    - name: "Start MinIO"
      ansible.builtin.command:
        cmd: >-
          docker run -d
          --name minio
          -p 9000:9000
          -e MINIO_ROOT_USER=test
          -e MINIO_ROOT_PASSWORD=testpassword
          minio/minio server /data
      changed_when: true

    - name: "Wait for MinIO to be ready"
      ansible.builtin.uri:
        url: "http://localhost:9000/minio/health/live"
        status_code: 200
      register: "minio_health"
      until: "minio_health.status == 200"
      retries: 30
      delay: 5

    - name: "Create S3 bucket"
      ansible.builtin.command:
        cmd: >-
          docker exec minio
          mkdir /data/test-backup-bucket
      changed_when: true

    - name: "Seed restic repo by applying role once"
      ansible.builtin.include_role:
        name: "postgres_restic_backup"
      vars:
        postgres_restic_backup_s3_endpoint: "http://localhost:9000"
        postgres_restic_backup_s3_bucket: "test-backup-bucket"
        postgres_restic_backup_s3_access_key: "test"
        postgres_restic_backup_s3_secret_key: "testpassword"
        postgres_restic_backup_restic_password: "testpassword"

    - name: "Create test database to restore"
      ansible.builtin.command:
        cmd: >-
          docker exec postgres
          psql -U postgres -c
          "CREATE DATABASE bootstrap_restore_test;"
      changed_when: true

    - name: "Seed test database with marker row"
      ansible.builtin.command:
        cmd: >-
          docker exec postgres
          psql -U postgres -d bootstrap_restore_test -c
          "CREATE TABLE marker (id int); INSERT INTO marker VALUES (42);"
      changed_when: true

    - name: "Run backup script to snapshot seeded data"
      ansible.builtin.command:
        cmd: "/opt/postgres-backup/backup.sh"
      changed_when: true

    - name: "Drop test database so postgres is empty before converge"
      ansible.builtin.command:
        cmd: >-
          docker exec postgres
          psql -U postgres -c
          "DROP DATABASE bootstrap_restore_test;"
      changed_when: true
