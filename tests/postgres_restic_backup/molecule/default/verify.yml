---
- name: "Verify"
  hosts: "all"
  tasks:
    - name: "Check backup directory exists"
      ansible.builtin.stat:
        path: "/opt/postgres-backup"
      register: "backup_dir"

    - name: "Assert backup directory exists"
      ansible.builtin.assert:
        that:
          - "backup_dir.stat.exists"
          - "backup_dir.stat.isdir"

    - name: "Check backup script exists"
      ansible.builtin.stat:
        path: "/opt/postgres-backup/backup.sh"
      register: "backup_script"

    - name: "Assert backup script exists and is executable"
      ansible.builtin.assert:
        that:
          - "backup_script.stat.exists"
          - "backup_script.stat.mode == '0700'"

    - name: "Check env file exists"
      ansible.builtin.stat:
        path: "/opt/postgres-backup/env"
      register: "env_file"

    - name: "Assert env file exists with correct permissions"
      ansible.builtin.assert:
        that:
          - "env_file.stat.exists"
          - "env_file.stat.mode == '0600'"

    - name: "Check restic repository is initialized"
      ansible.builtin.command:
        cmd: >-
          bash -c
          'source /opt/postgres-backup/env
          && restic snapshots'
      changed_when: false

    - name: "Run backup script manually"
      ansible.builtin.command:
        cmd: "/opt/postgres-backup/backup.sh"
      changed_when: true

    - name: "Verify backup exists in restic repository"
      ansible.builtin.command:
        cmd: >-
          bash -c
          'source /opt/postgres-backup/env
          && restic snapshots --json'
      register: "restic_snapshots"
      changed_when: false

    - name: "Assert at least one snapshot exists"
      ansible.builtin.assert:
        that:
          - "(restic_snapshots.stdout | from_json | length) > 0"

    # Given a dump command that fails mid-stream
    # When a backup is attempted
    # Then no snapshot is created from the truncated output
    - name: "Count snapshots before failing backup"
      ansible.builtin.command:
        cmd: >-
          bash -c
          'source /opt/postgres-backup/env
          && restic snapshots --json'
      register: "snapshots_before_failure"
      changed_when: false

    - name: "Run backup with a failing dump command"
      ansible.builtin.command:
        cmd: >-
          bash -c
          'source /opt/postgres-backup/env
          && restic backup --stdin-from-command
          --stdin-filename "fail.sql" -- false'
      register: "failing_backup"
      failed_when: false
      changed_when: false

    - name: "Count snapshots after failing backup"
      ansible.builtin.command:
        cmd: >-
          bash -c
          'source /opt/postgres-backup/env
          && restic snapshots --json'
      register: "snapshots_after_failure"
      changed_when: false

    - name: "Assert failing dump created no snapshot"
      ansible.builtin.assert:
        that:
          - "failing_backup.rc != 0"
          - >-
            (snapshots_after_failure.stdout | from_json | length)
            == (snapshots_before_failure.stdout | from_json | length)

    - name: "Read cron job file"
      ansible.builtin.slurp:
        src: "/etc/cron.d/postgres-restic-backup"
      register: "cron_file"

    - name: "Assert cron job is configured correctly"
      vars:
        content: "{{ cron_file.content | b64decode }}"
      ansible.builtin.assert:
        that:
          - "'CRON_TZ=UTC' in content"
          - >-
            'chronic /opt/postgres-backup/backup.sh'
            in content

    - name: "Query restored marker row"
      ansible.builtin.command:
        cmd: >-
          docker exec postgres
          psql -U postgres -d bootstrap_restore_test -t -A -c
          "SELECT id FROM marker;"
      register: "marker_query"
      changed_when: false

    - name: "Assert restored data matches"
      ansible.builtin.assert:
        that:
          - "marker_query.stdout | trim == '42'"
