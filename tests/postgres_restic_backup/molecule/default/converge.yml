---
- name: "Converge"
  hosts: "all"
  tasks:
    - name: "Apply role under test"
      ansible.builtin.include_role:
        name: "postgres_restic_backup"
      vars:
        postgres_restic_backup_repository: >-
          s3:http://localhost:9000/test-backup-bucket
        postgres_restic_backup_env:
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "testpassword"
        postgres_restic_backup_restic_password: "testpassword"
