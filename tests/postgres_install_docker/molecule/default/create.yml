---
- name: "Create QEMU VM"
  hosts: "localhost"
  connection: "local"
  gather_facts: false
  tasks:
    - name: "Create VM"
      ansible.builtin.include_role:
        name: "qemu_vm_create"
      vars:
        qemu_vm_create_name: "postgres-install-vm"
        qemu_vm_create_ssh_port: 2225
        qemu_vm_create_memory: "4G"
        qemu_vm_create_disk_size: "30G"
        qemu_vm_create_ssh_public_key: >-
          {{ lookup('file', '~/.ssh/id_ed25519.pub') }}
