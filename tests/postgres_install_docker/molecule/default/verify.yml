---
- name: "Verify"
  hosts: "all"
  vars:
    container_name: "postgres"
    pgbouncer_container_name: "pgbouncer"
    network_name: "postgres_network"
    db_user: "postgres"
  tasks:
    - name: "Check install directory exists"
      ansible.builtin.stat:
        path: "/opt/postgres"
      register: "install_dir"

    - name: "Assert install directory exists"
      ansible.builtin.assert:
        that:
          - "install_dir.stat.exists"
          - "install_dir.stat.isdir"

    - name: "Read docker-compose.yml"
      ansible.builtin.slurp:
        src: "/opt/postgres/docker-compose.yml"
      register: "compose_file"

    - name: "Assert docker-compose.yml contains expected content"
      vars:
        content: "{{ compose_file.content | b64decode }}"
      ansible.builtin.assert:
        that:
          - "container_name in content"

    - name: "Validate compose config"
      ansible.builtin.command:
        cmd: "docker compose config --quiet"
        chdir: "/opt/postgres"
      changed_when: false

    - name: "Check Docker network exists"
      ansible.builtin.command:
        cmd: "docker network inspect {{ network_name }}"
      changed_when: false

    - name: "Check container is running"
      ansible.builtin.command:
        cmd: "docker compose ps"
        chdir: "/opt/postgres"
      register: "compose_ps"
      changed_when: false

    - name: "Assert postgres container is listed"
      ansible.builtin.assert:
        that:
          - "container_name in compose_ps.stdout"

    - name: "Check PostgreSQL is ready"
      ansible.builtin.command:
        cmd: "docker exec {{ container_name }} pg_isready -U {{ db_user }}"
      register: "pg_ready"
      until: "pg_ready.rc == 0"
      retries: 10
      delay: 3
      changed_when: false

    - name: "Verify can connect and run SQL query"
      ansible.builtin.command:
        cmd: >-
          docker exec {{ container_name }}
          psql -U {{ db_user }} -t -A -c "SELECT 1"
      register: "psql_result"
      changed_when: false

    - name: "Assert SQL query returned expected result"
      ansible.builtin.assert:
        that:
          - "'1' in psql_result.stdout"

    - name: "Assert pgbouncer container is listed"
      ansible.builtin.assert:
        that:
          - "pgbouncer_container_name in compose_ps.stdout"

    - name: "Check pgBouncer is ready"
      ansible.builtin.command:
        cmd: >-
          docker exec {{ pgbouncer_container_name }}
          pg_isready -h localhost -p 6432 -U {{ db_user }}
      register: "pgbouncer_ready"
      until: "pgbouncer_ready.rc == 0"
      retries: 10
      delay: 3
      changed_when: false

    - name: "Verify SELECT 1 routed through pgBouncer"
      ansible.builtin.command:
        cmd: >-
          docker exec -e PGPASSWORD=testpassword123 {{ container_name }}
          psql -h {{ pgbouncer_container_name }} -p 6432
          -U {{ db_user }} -d {{ db_user }} -t -A -c "SELECT 1"
      register: "pgbouncer_psql_result"
      changed_when: false

    - name: "Assert pgBouncer SQL query returned expected result"
      ansible.builtin.assert:
        that:
          - "'1' in pgbouncer_psql_result.stdout"
