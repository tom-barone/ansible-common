---
- name: "Converge"
  hosts: "all"
  tasks:
    - name: "Apply role under test"
      ansible.builtin.include_role:
        name: "postfix_relay"
      vars:
        postfix_relay_host: "smtp.gmail.com"
        postfix_relay_port: "587"
        postfix_relay_username: "test@example.com"
        postfix_relay_password: "testpassword"
        postfix_relay_hostname: "testhost"
        postfix_relay_root_alias: "admin@example.com"
