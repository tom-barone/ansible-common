---
driver:
  name: "docker"
platforms:
  - name: "${TEST_NAME}"
    image: "${MOLECULE_DOCKER_IMAGE}"
    pre_build_image: true
    privileged: true
    cgroupns_mode: "host"
    command: ""
    volumes:
      - "/sys/fs/cgroup:/sys/fs/cgroup:rw"
provisioner:
  name: "ansible"

scenario:
  test_sequence:
    - "destroy"
    - "syntax"
    - "create"
    - "converge"
    - "idempotence"
    - "verify"
    - "destroy"
