---
- name: "Converge"
  hosts: "all"
  tasks:
    - name: "Apply role under test"
      ansible.builtin.include_role:
        name: "system_harden_ssh"
      vars:
        system_harden_ssh_public_key: >-
          {{ lookup('file', '~/.ssh/id_ed25519.pub') }}
        system_harden_ssh_exclusive_access: true
        system_harden_ssh_permit_root_login: "prohibit-password"
        system_harden_ssh_permit_password_authentication: "no"
