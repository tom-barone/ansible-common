---
- name: "Converge"
  hosts: "all"
  tasks:
    - name: "Apply role under test"
      ansible.builtin.include_role:
        name: "restic_backup"
      vars:
        restic_backup_s3_endpoint: "http://localhost:9000"
        restic_backup_s3_bucket: "test-backup-bucket"
        restic_backup_s3_access_key: "test"
        restic_backup_s3_secret_key: "testpassword"
        restic_backup_restic_password: "testpassword"
        restic_backup_path: "/opt/test-data"
