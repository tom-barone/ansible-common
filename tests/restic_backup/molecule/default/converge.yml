---
- name: "Converge"
  hosts: "all"
  tasks:
    - name: "Apply role under test"
      ansible.builtin.include_role:
        name: "restic_backup"
      vars:
        restic_backup_dir: "/opt/restic-backup"
        restic_backup_cron_job_name: "restic-backup"
        restic_backup_repository: >-
          s3:http://localhost:9000/test-backup-bucket/myapp
        restic_backup_env:
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "testpassword"
        restic_backup_restic_password: "testpassword"
        restic_backup_path: "/opt/test-data"
