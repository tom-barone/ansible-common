---
driver:
  name: "default"
platforms:
  - name: "restic-backup-vm"
provisioner:
  name: "ansible"
  inventory:
    host_vars:
      restic-backup-vm:
        ansible_host: "127.0.0.1"
        ansible_port: 2227
        ansible_user: "root"
        ansible_python_interpreter: "/usr/bin/python3"
        ansible_ssh_common_args: >-
          -o StrictHostKeyChecking=no
          -o UserKnownHostsFile=/dev/null
scenario:
  test_sequence:
    - "destroy"
    - "syntax"
    - "create"
    - "prepare"
    - "converge"
    - "idempotence"
    - "verify"
    - "destroy"
