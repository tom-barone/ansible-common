---
- name: "Converge"
  hosts: "all"
  roles:
    - role: "tailscale_install"
      vars:
        tailscale_install_oauth_client_id: >-
          {{ lookup('env', 'TAILSCALE_ANSIBLE_TEST_OAUTH_CLIENT_ID') }}
        tailscale_install_oauth_client_secret: >-
          {{ lookup('env', 'TAILSCALE_ANSIBLE_TEST_OAUTH_CLIENT_SECRET') }}
        tailscale_install_tags:
          - "ansible-test"
        tailscale_install_oauth_ephemeral: true
