---
- name: "Verify"
  hosts: "all"
  tasks:
    # Given the role was applied with GRUB_TIMEOUT=2
    # When we read the grub config
    # Then GRUB_TIMEOUT should be set to 2
    - name: "Read /etc/default/grub"
      ansible.builtin.slurp:
        src: "/etc/default/grub"
      register: "grub_config"

    - name: "Assert GRUB_TIMEOUT is set to 2"
      vars:
        content: "{{ grub_config.content | b64decode }}"
      ansible.builtin.assert:
        that:
          - "'GRUB_TIMEOUT=2' in content"
        msg: "GRUB_TIMEOUT was not set to expected value of 2"
