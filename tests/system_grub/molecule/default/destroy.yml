---
- name: "Destroy"
  hosts: "localhost"
  connection: "local"
  gather_facts: false
  vars:
    cache_dir: "{{ lookup('env', 'CACHE_DIR') }}"
    working_image: "proxmox-test-system-grub.qcow2"
    pid_file: "/tmp/molecule-system-grub-qemu.pid"
  tasks:
    - name: "Check if PID file exists"
      ansible.builtin.stat:
        path: "{{ pid_file }}"
      register: "pid_stat"

    - name: "Read QEMU PID file"
      when: "pid_stat.stat.exists"
      ansible.builtin.slurp:
        src: "{{ pid_file }}"
      register: "qemu_pid"

    - name: "Stop QEMU VM"
      when: "pid_stat.stat.exists"
      ansible.builtin.command:
        cmd: "kill {{ qemu_pid.content | b64decode | trim }}"
      register: "kill_result"
      changed_when: "kill_result.rc == 0"
      failed_when: >-
        kill_result.rc != 0 and
        'No such process' not in kill_result.stderr

    - name: "Remove PID file"
      ansible.builtin.file:
        path: "{{ pid_file }}"
        state: "absent"

    - name: "Remove working image"
      ansible.builtin.file:
        path: "{{ cache_dir }}/{{ working_image }}"
        state: "absent"
