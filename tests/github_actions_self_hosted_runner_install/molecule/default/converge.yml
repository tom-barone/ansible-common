---
- name: "Converge"
  hosts: "all"
  tasks:
    - name: "Apply role under test"
      ansible.builtin.include_role:
        name: "github_actions_self_hosted_runner_install"
      vars:
        github_actions_self_hosted_runner_install_url: >-
          https://github.com/test/repo
        github_actions_self_hosted_runner_install_token: >-
          dummy-token
        github_actions_self_hosted_runner_install_skip_registration: >-
          true

    - name: "Create runner marker to verify force_reinstall cleans runner dir"
      ansible.builtin.file:
        path: "/opt/github-runner/.force_reinstall_test_marker"
        state: "touch"
        mode: "0644"

    - name: "Create cache marker to verify force_reinstall cleans cache dir"
      ansible.builtin.file:
        path: "/opt/github-runner-cache/.force_reinstall_cache_marker"
        state: "touch"
        mode: "0644"

    - name: "Apply role with force_reinstall"
      ansible.builtin.include_role:
        name: "github_actions_self_hosted_runner_install"
      vars:
        github_actions_self_hosted_runner_install_url: >-
          https://github.com/test/repo
        github_actions_self_hosted_runner_install_token: >-
          dummy-token
        github_actions_self_hosted_runner_install_skip_registration: >-
          true
        github_actions_self_hosted_runner_install_force_reinstall: true
